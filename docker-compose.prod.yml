services:
  redis:
    image: redis:7-alpine
    container_name: hackaton-redis
    restart: unless-stopped
    networks: [coolify]

  postgres:
    image: postgres:16-alpine
    container_name: hackaton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hackaton
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hackaton
    volumes:
      - hackaton_pgdata:/var/lib/postgresql/data
    networks: [coolify]

  browser:
    image: ghcr.io/andreisirbu91-lab/hackathon-browser:latest
    container_name: hackaton-browser
    restart: unless-stopped
    shm_size: 2gb
    networks: [coolify]
    labels:
      # Reverse-proxy /vnc/* on the main domain (same origin as the app) to the
      # noVNC HTTP server inside this container. The browser subdomain is no
      # longer exposed publicly — eliminates the unauthenticated entry point.
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.middlewares.hackaton-vnc-strip.stripprefix.prefixes=/vnc"
      - "traefik.http.routers.hackaton-browser-vnc.entryPoints=https"
      - "traefik.http.routers.hackaton-browser-vnc.rule=Host(`hack.rzs-it.ro`) && PathPrefix(`/vnc`)"
      - "traefik.http.routers.hackaton-browser-vnc.middlewares=hackaton-vnc-strip"
      - "traefik.http.routers.hackaton-browser-vnc.tls=true"
      - "traefik.http.routers.hackaton-browser-vnc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hackaton-browser-vnc.service=hackaton-browser-vnc"
      - "traefik.http.services.hackaton-browser-vnc.loadbalancer.server.port=6080"

  mcp:
    image: ghcr.io/andreisirbu91-lab/hackathon-mcp:latest
    container_name: hackaton-mcp
    restart: unless-stopped
    depends_on: [redis, browser]
    networks: [coolify]
    environment:
      PORT: 3001
      REDIS_URL: redis://hackaton-redis:6379
      BROWSER_PLAYWRIGHT_WS: ws://hackaton-browser:3002
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SUPABASE_DB_URL: postgresql://hackaton:${POSTGRES_PASSWORD}@hackaton-postgres:5432/hackaton
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_SUBAGENT_MODEL: ${ANTHROPIC_SUBAGENT_MODEL:-claude-sonnet-4-6}

  web:
    image: ghcr.io/andreisirbu91-lab/hackathon-web:latest
    container_name: hackaton-web
    restart: unless-stopped
    depends_on: [redis, mcp]
    networks: [coolify]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_FALLBACK_MODEL: ${ANTHROPIC_FALLBACK_MODEL:-claude-opus-4-7}
      REDIS_URL: redis://hackaton-redis:6379
      MCP_SERVER_URL: http://hackaton-mcp:3001/mcp
      NEXT_PUBLIC_BROWSER_VNC_URL: ${NEXT_PUBLIC_BROWSER_VNC_URL:-https://browser.hack.rzs-it.ro/vnc.html}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Hack A Ton 2026}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      - "traefik.http.routers.http-hackaton-web.entryPoints=http"
      - "traefik.http.routers.http-hackaton-web.rule=Host(`hack.rzs-it.ro`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-hackaton-web.middlewares=redirect-to-https"
      - "traefik.http.routers.http-hackaton-web.service=http-hackaton-web"
      - "traefik.http.routers.https-hackaton-web.entryPoints=https"
      - "traefik.http.routers.https-hackaton-web.rule=Host(`hack.rzs-it.ro`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-hackaton-web.middlewares=gzip"
      - "traefik.http.routers.https-hackaton-web.service=https-hackaton-web"
      - "traefik.http.routers.https-hackaton-web.tls=true"
      - "traefik.http.routers.https-hackaton-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.http-hackaton-web.loadbalancer.server.port=3000"
      - "traefik.http.services.https-hackaton-web.loadbalancer.server.port=3000"

volumes:
  hackaton_pgdata:

networks:
  coolify:
    external: true

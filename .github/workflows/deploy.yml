name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: andreisirbu91-lab
  REPO: hackathon

jobs:
  # ── Build all 3 images in parallel, push to GHCR ────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: apps/web
            image: hackathon-web
          - service: mcp
            context: apps/mcp-server
            image: hackathon-mcp
          - service: browser
            context: apps/browser-worker
            image: hackathon-browser
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Deploy: SCP compose, pull all images, recreate ──────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure /opt/hackaton-stack exists
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'mkdir -p /opt/hackaton-stack && chmod 755 /opt/hackaton-stack'

      - name: SCP docker-compose.prod.yml
        run: |
          scp docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/hackaton-stack/docker-compose.prod.yml

      - name: Pull images and recreate containers
        env:
          GHCR_TOKEN: ${{ secrets.CR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            GHCR_TOKEN="$GHCR_TOKEN" GITHUB_ACTOR="$GITHUB_ACTOR" '
            set -euo pipefail
            cd /opt/hackaton-stack
            if [ ! -f .env ]; then
              echo "FATAL: /opt/hackaton-stack/.env missing — create it before first deploy."
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f
          '

      - name: Health check with retry
        run: |
          sleep 20
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://hack.rzs-it.ro/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 6 attempts (last status: $STATUS)"
          exit 1
